<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/libros">
      <i class="bi bi-book-half me-2"></i>Biblioteca Digital
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        @if (authService.isAuthenticated()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/libros" routerLinkActive="active">
              <i class="bi bi-journals me-1"></i>Libros
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/prestamos" routerLinkActive="active">
              <i class="bi bi-arrow-left-right me-1"></i>Préstamos
            </a>
          </li>
        }
      </ul>
      <ul class="navbar-nav">
        @if (authService.isAuthenticated()) {
          @if (authService.isAdmin()) {
            <li class="nav-item">
              <span class="nav-link text-warning">
                <i class="bi bi-shield-fill me-1"></i>Admin
              </span>
            </li>
          }
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm ms-2" (click)="logout()">
              <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
            </button>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              <i class="bi bi-person me-1"></i>Iniciar sesión
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/registro" routerLinkActive="active">
              <i class="bi bi-person-plus me-1"></i>Registrarse
            </a>
          </li>
