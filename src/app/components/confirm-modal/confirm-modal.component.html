@if (visible) {
  <div class="modal-backdrop-custom" (click)="cancel()"></div>

  <div class="modal-dialog-custom">
    <div class="card shadow-lg border-0 rounded-4 text-center" style="width: 420px;">
      <div class="card-body p-4">

        <div class="mb-3">
          @if (config.type === 'danger') {
            <span style="font-size:2.2rem; line-height:1;">🗑️</span>
          } @else if (config.type === 'warning') {
            <span style="font-size:2.2rem; line-height:1;">⚠️</span>
          } @else {
            <span style="font-size:2.2rem; line-height:1;">ℹ️</span>
          }
        </div>

        <h6 class="fw-bold mb-2">{{ config.title }}</h6>
        <p class="text-muted mb-0" style="font-size: 0.9rem;">{{ config.message }}</p>

        <div class="d-flex justify-content-center gap-2 pt-3 mt-3 border-top">
          <button class="btn btn-light border px-4" (click)="cancel()">
            {{ config.cancelLabel }}
          </button>
          <button class="btn px-4"
                  [class.btn-danger]="config.type === 'danger'"
                  [class.btn-warning]="config.type === 'warning'"
                  [class.btn-primary]="config.type === 'info'"
                  (click)="confirm()">
            {{ config.confirmLabel }}
          </button>
        </div>

      </div>
    </div>
  </div>
}
